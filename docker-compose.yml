version: '3.8'

services:
  # ---------- Infrastructure ----------
  postgres:
    image: postgres:15-alpine
    container_name: velotrack-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velotrack-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: velotrack-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - velotrack-net

  ollama:
    image: ollama/ollama:latest
    container_name: velotrack-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - velotrack-net

  # ---------- Backend Microservices ----------
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: velotrack-user-service
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - velotrack-net

  bicycle-service:
    build:
      context: ./backend/bicycle-service
      dockerfile: Dockerfile
    container_name: velotrack-bicycle-service
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - velotrack-net

  maintenance-rental-service:
    build:
      context: ./backend/maintenance-rental-service
      dockerfile: Dockerfile
    container_name: velotrack-maintenance-rental-service
    ports:
      - "5003:5003"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      BICYCLE_SERVICE_URL: ${BICYCLE_SERVICE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - velotrack-net

  maintenance-assistant-service:
    build:
      context: ./backend/maintenance-assistant-service
      dockerfile: Dockerfile
    container_name: velotrack-maintenance-assistant-service
    ports:
      - "5004:5004"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      OLLAMA_URL: ${OLLAMA_URL}
      MAINTENANCE_RENTAL_SERVICE_URL: ${MAINTENANCE_RENTAL_SERVICE_URL}
      BICYCLE_SERVICE_URL: ${BICYCLE_SERVICE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - velotrack-net

  # ---------- Frontend ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: velotrack-frontend
    ports:
      - "3000:3000"
    environment:
      PUBLIC_API_BASE_URL: http://localhost:8080
    depends_on:
      - user-service
      - bicycle-service
      - maintenance-rental-service
      - maintenance-assistant-service
    networks:
      - velotrack-net

  # ---------- API Gateway (NGINX) ----------
  nginx:
    image: nginx:alpine
    container_name: velotrack-nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - bicycle-service
      - maintenance-rental-service
      - maintenance-assistant-service
      - frontend
    networks:
      - velotrack-net

volumes:
  postgres_data:
  ollama_data:

networks:
  velotrack-net:
    driver: bridge

