events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream user_service {
        server user-service:5001;
    }

    upstream bicycle_service {
        server bicycle-service:5002;
    }

    upstream maintenance_rental_service {
        server maintenance-rental-service:5003;
    }

    upstream maintenance_assistant_service {
        server maintenance-assistant-service:5004;
    }

    server {
        listen 80;
        server_name localhost;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User Service
        location /api/auth/ {
            proxy_pass http://user_service/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/users/ {
            proxy_pass http://user_service/api/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Bicycle Service
        location /api/bicycles/ {
            proxy_pass http://bicycle_service/api/bicycles/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Maintenance & Rental Service
        location /api/maintenance/ {
            proxy_pass http://maintenance_rental_service/api/maintenance/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/rentals/ {
            proxy_pass http://maintenance_rental_service/api/rentals/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Maintenance Assistant Service
        location /api/maintenance-assistant/ {
            proxy_pass http://maintenance_assistant_service/api/maintenance-assistant/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
        }

        location /api/risk-scores/ {
            proxy_pass http://maintenance_assistant_service/api/risk-scores/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

