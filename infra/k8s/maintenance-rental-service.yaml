apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-rental-service
  namespace: velotrack
  labels:
    app: maintenance-rental-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maintenance-rental-service
  template:
    metadata:
      labels:
        app: maintenance-rental-service
    spec:
      containers:
        - name: maintenance-rental-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/velotrack-maintenance-rental-service:latest
          ports:
            - containerPort: 5003
          envFrom:
            - configMapRef:
                name: velotrack-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: velotrack-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: velotrack-secrets
                  key: JWT_SECRET
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: velotrack-secrets
                  key: RABBITMQ_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: maintenance-rental-service
  namespace: velotrack
spec:
  selector:
    app: maintenance-rental-service
  ports:
    - port: 5003
      targetPort: 5003
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: maintenance-rental-service-hpa
  namespace: velotrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: maintenance-rental-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

