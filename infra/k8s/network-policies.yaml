# Network Policies for VeloTrack — Network Segregation & Security
# Implements principle of least privilege at the network layer
---
# Allow only backend services to access PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-access
  namespace: velotrack
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: user-service
        - podSelector:
            matchLabels:
              app: bicycle-service
        - podSelector:
            matchLabels:
              app: maintenance-rental-service
        - podSelector:
            matchLabels:
              app: maintenance-assistant-service
      ports:
        - protocol: TCP
          port: 5432
---
# Allow only services that publish/consume events to access RabbitMQ
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-access
  namespace: velotrack
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: bicycle-service
        - podSelector:
            matchLabels:
              app: maintenance-rental-service
        - podSelector:
            matchLabels:
              app: maintenance-assistant-service
      ports:
        - protocol: TCP
          port: 5672
        - protocol: TCP
          port: 15672
---
# Allow frontend to receive traffic from ingress only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-access
  namespace: velotrack
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 3000
---
# Backend services: allow traffic from frontend/ingress and inter-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-services-access
  namespace: velotrack
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - user-service
          - bicycle-service
          - maintenance-rental-service
          - maintenance-assistant-service
  policyTypes:
    - Ingress
  ingress:
    # Allow from other backend services (inter-service communication)
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - user-service
                  - bicycle-service
                  - maintenance-rental-service
                  - maintenance-assistant-service
                  - frontend
    # Allow from ingress controller
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5001
        - protocol: TCP
          port: 5002
        - protocol: TCP
          port: 5003
        - protocol: TCP
          port: 5004

